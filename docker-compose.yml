services:
  vue-idle-xiuxian:
    image: kowming/vue-idle-xiuxian:latest
    container_name: xiuxian
    restart: unless-stopped
    ports:
      - 8183:8080
    tty: true
    stdin_open: true
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: xiuxian-backend
    restart: unless-stopped
    environment:
      APP_ENV: development
      HTTP_PORT: 8081
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/xiuxian?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MIGRATIONS_DIR: /app/migrations
      JWT_SECRET: change-me-in-production
      ACCESS_TOKEN_TTL_SECONDS: 3600
      REFRESH_TOKEN_TTL_SECONDS: 604800
      OAUTH_STATE_TTL_SECONDS: 600
      ENABLE_DEV_LOGIN: "true"
      LINUX_DO_CLIENT_ID: ""
      LINUX_DO_CLIENT_SECRET: ""
      LINUX_DO_REDIRECT_URL: ""
      LINUX_DO_SCOPE: "openid profile"
      FRONTEND_LOGIN_SUCCESS_URL: "http://localhost:2025/#/auth/callback"
      FRONTEND_LOGIN_FAILURE_URL: "http://localhost:2025/#/auth/callback"
    depends_on:
      - postgres
      - redis
    ports:
      - 8081:8081

  postgres:
    image: postgres:16-alpine
    container_name: xiuxian-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xiuxian
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: xiuxian-redis
    restart: unless-stopped
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
